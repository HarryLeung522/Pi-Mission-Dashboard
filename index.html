<script>
    // 直接使用你提供的 CSV 發佈網址
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLnU0BMgl4AFXJuTVBtdmcCvuhDbv7TJxLHGK0BQZ9pJTOxdcLQ2QU1inCjXeZKJdc9v3-y4Kfk4aS/pub?output=csv";

    let globalData = [];
    let personChartInstance = null;
    let overallChartInstance = null;

    // 欄位索引 (A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8, J=9, K=10)
    const COL = { ASPECT: 0, PROJECT: 1, TASK: 2, INITIATOR: 3, OWNER: 4, IMPORTANT: 5, URGENT: 6, PROGRESS: 7, CREATED: 8, DEADLINE: 9, COMPLETED: 10 };

    // 初始化讀取資料
    Papa.parse(csvUrl, {
        download: true,
        header: false,
        complete: function(results) {
            // 移除第一行標題列
            globalData = results.data.slice(1).filter(row => row.length > 5 && row[COL.ASPECT]); 
            
            initDashboard();
        },
        error: function(err) {
            alert("讀取資料失敗，請確認 Google Sheet 是否已「發佈到網路」。");
            console.error(err);
        }
    });

    function initDashboard() {
        // 渲染總體分析
        renderDashboard(globalData, 'overall');

        // 建立負責人下拉選單
        const owners = [...new Set(globalData.map(row => row[COL.OWNER]).filter(o => o && o.trim() !== ''))].sort();
        const select = document.getElementById('personSelect');
        select.innerHTML = '<option value="">-- 請選擇負責人 --</option>';
        owners.forEach(owner => {
            select.innerHTML += `<option value="${owner}">${owner}</option>`;
        });

        // 監聽下拉選單改變
        select.addEventListener('change', function(e) {
            const selectedPerson = e.target.value;
            if (selectedPerson) {
                const filteredData = globalData.filter(row => row[COL.OWNER] === selectedPerson);
                renderDashboard(filteredData, 'person');
            } else {
                clearPersonDashboard();
            }
        });
    }

    function renderDashboard(data, type) {
        // 1. Aspect 圓形圖資料整理
        const aspectCounts = {};
        data.forEach(row => {
            const aspect = row[COL.ASPECT] || '未分類';
            aspectCounts[aspect] = (aspectCounts[aspect] || 0) + 1;
        });

        // 2. Project 排行榜資料整理
        const projectCounts = {};
        data.forEach(row => {
            const project = row[COL.PROJECT] || '未分類';
            projectCounts[project] = (projectCounts[project] || 0) + 1;
        });
        const sortedProjects = Object.entries(projectCounts).sort((a, b) => b[1] - a[1]);

        // 3. 矩陣與進度資料整理
        let matrix = { iu: 0, inu: 0, uiu: 0, uinu: 0 }; 
        let timing = { onTime: 0, early: 0, late: 0 };

        // 以下為資料處理邏輯...
        data.forEach(row => {
            // 處理矩陣
            const isImp = (row[COL.IMPORTANT] || '').trim().toLowerCase() === 'yes';
            const isUrg = (row[COL.URGENT] || '').trim().toLowerCase() === 'yes';
            
            if (isImp && isUrg) matrix.iu++;
            else if (isImp && !isUrg) matrix.inu++;
            else if (!isImp && isUrg) matrix.uiu++;
            else matrix.uinu++;

            // 處理日期 (比較 J行 Deadline 和 K行 完成日期)
            const deadlineStr = row[COL.DEADLINE];
            const completedStr = row[COL.COMPLETED];
            
            if (deadlineStr && completedStr) {
                const deadline = new Date(deadlineStr);
                const completed = new Date(completedStr);
                
                if (!isNaN(deadline) && !isNaN(completed)) {
                    deadline.setHours(0,0,0,0);
                    completed.setHours(0,0,0,0);

                    if (completed.getTime() === deadline.getTime()) timing.onTime++;
                    else if (completed.getTime() < deadline.getTime()) timing.early++;
                    else timing.late++;
                }
            }
        });

        // 更新畫面
        drawPieChart(`${type}PieChart`, aspectCounts, type);
        updateProjectList(`${type}ProjectList`, sortedProjects);
        updateMatrixStats(`${type}MatrixStats`, matrix);
        updateTimingStats(`${type}TimingStats`, timing);
    }

    // 畫圓形圖
    function drawPieChart(canvasId, dataCounts, type) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const labels = Object.keys(dataCounts);
        const dataValues = Object.values(dataCounts);
        
        const colors = ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#0dcaf0', '#6f42c1', '#fd7e14', '#20c997'];

        if (type === 'person' && personChartInstance) personChartInstance.destroy();
        if (type === 'overall' && overallChartInstance) overallChartInstance.destroy();

        const newChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: colors.slice(0, labels.length),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                let value = context.raw;
                                let total = context.chart._metasets[context.datasetIndex].total;
                                let percentage = Math.round((value / total) * 100) + "%";
                                return `${label}: ${value} (${percentage})`;
                            }
                        }
                    }
                }
            }
        });

        if (type === 'person') personChartInstance = newChart;
        if (type === 'overall') overallChartInstance = newChart;
    }

    function updateProjectList(listId, sortedProjects) {
        const listEl = document.getElementById(listId);
        listEl.innerHTML = '';
        if (sortedProjects.length === 0) {
            listEl.innerHTML = '<li class="list-group-item text-center text-muted">無資料</li>';
            return;
        }
        sortedProjects.forEach(([project, count], index) => {
            const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
            listEl.innerHTML += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${medal} ${project}</span>
                    <span class="badge-count">${count}</span>
                </li>
            `;
        });
    }

    function updateMatrixStats(containerId, matrix) {
        document.getElementById(containerId).innerHTML = `
            <div class="col-6"><div class="stat-box"><div class="stat-number text-danger">${matrix.iu}</div><div class="stat-label">重要 / 緊急</div></div></div>
            <div class="col-6"><div class="stat-box"><div class="stat-number text-primary">${matrix.inu}</div><div class="stat-label">重要 / 不緊急</div></div></div>
            <div class="col-6"><div class="stat-box"><div class="stat-number text-warning">${matrix.uiu}</div><div class="stat-label">不重要 / 緊急</div></div></div>
            <div class="col-6"><div class="stat-box"><div class="stat-number text-secondary">${matrix.uinu}</div><div class="stat-label">不重要 / 不緊急</div></div></div>
        `;
    }

    function updateTimingStats(containerId, timing) {
        document.getElementById(containerId).innerHTML = `
            <div class="col-4"><div class="stat-box"><div class="stat-number text-success">${timing.early}</div><div class="stat-label">提早完成</div></div></div>
            <div class="col-4"><div class="stat-box"><div class="stat-number text-primary">${timing.onTime}</div><div class="stat-label">如期完成</div></div></div>
            <div class="col-4"><div class="stat-box"><div class="stat-number text-danger">${timing.late}</div><div class="stat-label">遲延完成</div></div></div>
        `;
    }

    function clearPersonDashboard() {
        if (personChartInstance) personChartInstance.destroy();
        document.getElementById('personProjectList').innerHTML = '<li class="list-group-item text-center text-muted py-4">請選擇負責人</li>';
        document.getElementById('personMatrixStats').innerHTML = '';
        document.getElementById('personTimingStats').innerHTML = '';
    }
</script>
